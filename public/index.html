<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iChat · White Glass Design</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="chat-app">
        <div class="liquid-shimmer"></div>
        <div class="app-inner">
            <!-- Header Section -->
            <div class="chat-header">
                <div class="brand">
                    <h1>iChat App</h1>
                    <p>anonymous <span class="whisper">• name your style</span></p>
                </div>
                <div class="status-badge">
                    ✨ live · glass
                </div>
            </div>

            <!-- NAME INPUT: allows user to write custom name -->
            <div class="name-input-row">
                <div class="name-input-wrapper">
                    <span class="name-icon-label">✍️</span>
                    <input type="text" id="userNameInput" class="name-input"
                        placeholder="Your name (e.g., Emma, Leo, Luna)" maxlength="24" autocomplete="off">
                    <span style="font-size:13px; opacity:0.5;">✨</span>
                </div>
                <div class="name-hint">
                    ⚡ Type your name → messages show your identity
                </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messageList">
                <div class="message">
                    <div class="message-sender">
                        <span>☁️ iChat</span>
                        <span class="name-icon">Glass</span>
                    </div>
                    <div class="message-bubble">
                        Welcome to White Edition ✨ Write your name above and say hello.
                    </div>
                </div>
                <div class="message">
                    <div class="message-sender">
                        <span>🕊️ system</span>
                        <span class="name-icon">pure</span>
                    </div>
                    <div class="message-bubble">
                        Liquid glass effect — light & bright design.
                    </div>
                </div>
            </div>

            <!-- Chat Input Footer -->
            <div class="chat-footer">
                <div class="input-group">
                    <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
                    <button class="send-button" id="sendBtn">
                        ▲
                    </button>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <span>🌊 connected · white glass</span>
                <span class="clients-count" id="totalClients">Total clients: 2</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
